{% extends "layout.html" %}
{% block title %}
Home - Allmyalts
{% endblock %}
{% block content %}
<div id="home-particles"></div>
<section class="home-content flex">
    <div class="home-hero">
        <div class="home-glow"></div>
        <img src="static/images/splash.png" alt="GET All my Alts!" class="home-splash">
        <p class="home-tagline">All your alts. One place.</p>
        <a href="/login" class="btn-bnet">
            <svg class="bnet-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 3.6a8.354 8.354 0 0 1 5.91 2.447l-8.388 8.389a.48.48 0 0 1-.68 0L6.427 11.62a.48.48 0 0 1 0-.68l4.25-4.25a.48.48 0 0 0 0-.679l-.953-.953a.48.48 0 0 0-.68 0L4.8 9.303A8.354 8.354 0 0 1 12 3.6zm0 16.8a8.354 8.354 0 0 1-5.91-2.447l8.388-8.389a.48.48 0 0 1 .68 0l2.415 2.416a.48.48 0 0 1 0 .68l-4.25 4.25a.48.48 0 0 0 0 .679l.953.953a.48.48 0 0 0 .68 0l4.244-4.244A8.354 8.354 0 0 1 12 20.4z"/>
            </svg>
            Log in with Battle.net
        </a>
    </div>
</section>
{% endblock %}
{% block scripts %}
<script>
    tsParticles.load("home-particles", {
        fullScreen: { enable: false },
        background: { color: { value: "transparent" } },
        particles: {
            number: { value: 60 },
            color: { value: ["#ec008c", "#ffffff", "#aaaaaa"] },
            shape: { type: "circle" },
            opacity: { value: 0.15 },
            size: { value: { min: 1, max: 3 } },
            move: {
                enable: true,
                speed: 0.4,
                direction: "none",
                random: true,
                outModes: { default: "out" }
            }
        },
        interactivity: { events: { onHover: { enable: false } } }
    });
</script>
{% endblock %}
